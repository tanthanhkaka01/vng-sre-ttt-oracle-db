<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .sub { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #1e293b; }
    .text { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
  </style>
  <text x="600" y="42" text-anchor="middle" class="title">Backup Architecture (RMAN + Data Guard)</text>
  <rect x="80" y="140" width="330" height="130" class="box"/>
  <text x="245" y="190" text-anchor="middle" class="sub">Primary RAC (pridb)</text>
  <text x="245" y="225" text-anchor="middle" class="text">L0/L1 + Archivelog backup</text>
  <rect x="460" y="140" width="280" height="130" class="box"/>
  <text x="600" y="190" text-anchor="middle" class="sub">Standby RAC (drdb)</text>
  <text x="600" y="225" text-anchor="middle" class="text">Optional backup offload</text>
  <rect x="790" y="120" width="330" height="170" class="box"/>
  <text x="955" y="185" text-anchor="middle" class="sub">Backup Storage</text>
  <text x="955" y="220" text-anchor="middle" class="text">NFS / Object / Appliance</text>
  <line x1="410" y1="205" x2="780" y2="205" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="740" y1="225" x2="780" y2="225" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
