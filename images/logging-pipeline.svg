<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <style>
    .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .text { font: 600 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
    .line { stroke: #334155; stroke-width: 2; }
  </style>
  <text x="600" y="40" text-anchor="middle" class="title">Centralized Logging Pipeline</text>
  <rect x="180" y="130" width="280" height="90" class="box"/>
  <text x="320" y="165" text-anchor="middle" class="text">DB Alert / Listener / OS Logs</text>
  <text x="320" y="195" text-anchor="middle" class="text">CRS / ASM / RMAN Logs</text>
  <line x1="460" y1="175" x2="550" y2="175" class="line"/>
  <rect x="550" y="140" width="190" height="70" class="box"/>
  <text x="645" y="182" text-anchor="middle" class="text">Log Shipper</text>
  <line x1="740" y1="175" x2="850" y2="175" class="line"/>
  <rect x="850" y="130" width="180" height="90" class="box"/>
  <text x="940" y="170" text-anchor="middle" class="text">Central Log Store</text>
  <text x="940" y="198" text-anchor="middle" class="text">ELK/OpenSearch</text>
  <text x="600" y="300" text-anchor="middle" class="text">Dashboards + Search + Incident Investigation</text>
</svg>
