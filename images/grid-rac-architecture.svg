<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430">
  <style>
    .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .text { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .sub { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #1e293b; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
  </style>
  <text x="600" y="42" text-anchor="middle" class="title">Oracle Grid Infrastructure RAC View</text>
  <rect x="450" y="85" width="300" height="65" class="box"/>
  <text x="600" y="125" text-anchor="middle" class="sub">Application / DNS / SCAN</text>
  <rect x="180" y="190" width="320" height="110" class="box"/>
  <text x="340" y="250" text-anchor="middle" class="sub">RAC Node 1</text>
  <text x="340" y="280" text-anchor="middle" class="text">Clusterware + ASM</text>
  <rect x="700" y="190" width="320" height="110" class="box"/>
  <text x="860" y="250" text-anchor="middle" class="sub">RAC Node 2</text>
  <text x="860" y="280" text-anchor="middle" class="text">Clusterware + ASM</text>
  <rect x="380" y="330" width="440" height="70" class="box"/>
  <text x="600" y="373" text-anchor="middle" class="sub">Shared ASM Storage (+OCR / +DATA / +FRA)</text>
  <line x1="600" y1="150" x2="340" y2="190" stroke="#334155" stroke-width="2"/>
  <line x1="600" y1="150" x2="860" y2="190" stroke="#334155" stroke-width="2"/>
  <line x1="340" y1="300" x2="500" y2="330" stroke="#334155" stroke-width="2"/>
  <line x1="860" y1="300" x2="700" y2="330" stroke="#334155" stroke-width="2"/>
</svg>
