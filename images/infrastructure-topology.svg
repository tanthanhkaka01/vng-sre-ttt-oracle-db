<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <style>
    .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .sub { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #1e293b; }
    .text { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
  </style>
  <text x="600" y="42" text-anchor="middle" class="title">Infrastructure Topology (2 DC / 4 RAC Nodes)</text>
  <rect x="80" y="90" width="500" height="280" class="box"/>
  <text x="330" y="130" text-anchor="middle" class="sub">Primary Site (DC1)</text>
  <text x="140" y="190" class="text">RAC Nodes: rac-node1, rac-node2</text>
  <text x="140" y="230" class="text">Shared Disks:</text>
  <text x="160" y="265" class="text">LUN_DATA 10TB, LUN_FRA 6TB</text>
  <text x="160" y="300" class="text">LUN_OCR1/2/3 200GB</text>
  <rect x="620" y="90" width="500" height="280" class="box"/>
  <text x="870" y="130" text-anchor="middle" class="sub">DR Site (DC2)</text>
  <text x="680" y="190" class="text">RAC Nodes: rac-node3, rac-node4</text>
  <text x="680" y="230" class="text">Standby RAC for Data Guard</text>
  <text x="680" y="265" class="text">Independent storage domain</text>
  <text x="600" y="402" text-anchor="middle" class="text">Primary and DR separated by datacenter boundary for resilience</text>
</svg>
