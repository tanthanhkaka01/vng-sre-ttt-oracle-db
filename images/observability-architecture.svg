<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <style>
    .title { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .text { font: 600 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
    .line { stroke: #334155; stroke-width: 2; }
  </style>
  <text x="600" y="40" text-anchor="middle" class="title">Observability Architecture</text>
  <rect x="390" y="70" width="420" height="55" class="box"/><text x="600" y="105" text-anchor="middle" class="text">RAC/DB Nodes + DR Nodes</text>
  <line x1="600" y1="125" x2="600" y2="145" class="line"/>
  <rect x="430" y="145" width="340" height="55" class="box"/><text x="600" y="180" text-anchor="middle" class="text">Exporters / Agents</text>
  <line x1="600" y1="200" x2="600" y2="220" class="line"/>
  <rect x="340" y="220" width="520" height="55" class="box"/><text x="600" y="255" text-anchor="middle" class="text">Metrics Collector (Prometheus / OEM / Zabbix)</text>
  <line x1="600" y1="275" x2="600" y2="295" class="line"/>
  <rect x="360" y="295" width="480" height="55" class="box"/><text x="600" y="330" text-anchor="middle" class="text">Alert Engine (Alertmanager / OEM Rules)</text>
  <line x1="600" y1="350" x2="600" y2="370" class="line"/>
  <rect x="320" y="370" width="560" height="55" class="box"/><text x="600" y="405" text-anchor="middle" class="text">Notification Channels (Email, Slack, PagerDuty)</text>
  <line x1="600" y1="425" x2="600" y2="445" class="line"/>
  <rect x="460" y="445" width="280" height="40" class="box"/><text x="600" y="471" text-anchor="middle" class="text">Ops/SRE On-call</text>
</svg>
